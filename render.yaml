services:
  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  - type: web
    name: wayfinder-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0

  # NOTE: Add the React frontend as a Static Site manually in the Render dashboard.
  # Build command: npm install && npm run build
  # Publish directory: dist
  # Env var: VITE_BACKEND_URL = https://<wayfinder-api url from above>
