services:
  - type: web
    name: wayfinder
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: discovery_track_ai
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
