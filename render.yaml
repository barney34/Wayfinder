services:
  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  - type: web
    name: wayfinder-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: MONGODB_URL
        sync: false          # You will paste this in the Render dashboard
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0

  # ── Frontend (React/Vite static site) ────────────────────────────────────
  - type: web
    name: wayfinder
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: wayfinder-api
          property: host
          format: https://{value}
